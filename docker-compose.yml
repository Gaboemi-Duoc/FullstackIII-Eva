services:
  kafka:
    image: bitnami/kafka:latest
    container_name: smartlogix-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    networks:
      - smartlogix-net

  backend:
    build: ./FullstackIII-Backend
    container_name: smartlogix-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - smartlogix-net

  bff:
    build: ./smartlogix-bff
    container_name: smartlogix-bff
    ports:
      - "8081:8081"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - smartlogix-net

  krakend:
    image: devopsfaith/krakend:latest
    container_name: smartlogix-krakend
    ports:
      - "8090:8080"
    volumes:
      - ./krakend/krakend.json:/etc/krakend/krakend.json
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    depends_on:
      - bff
      - backend
    networks:
      - smartlogix-net

  frontend:
    build: ./FullstackIII-Front
    container_name: smartlogix-frontend
    ports:
      - "5173:5173"
    depends_on:
      - krakend
    networks:
      - smartlogix-net

networks:
  smartlogix-net:
    driver: bridge