apiVersion: v1
kind: ConfigMap
metadata:
  name: krakend-config
  namespace: smartlogix
  labels:
    app: krakend
data:
  krakend.json: |
    {
      "version": 3,
      "timeout": "30s",
      "cache_ttl": "300s",
      "name": "SmartLogix API Gateway",
      "port": 8080,
      "extra_config": {
        "github_com/devopsfaith/krakend-gologging": {
          "level": "DEBUG",
          "prefix": "[KRAKEND]",
          "syslog": false,
          "stdout": true,
          "format": "default"
        },
        "github_com/devopsfaith/krakend-cors": {
          "allow_origins": ["http://localhost:5173", "http://localhost:30080"],
          "allow_methods": ["GET", "POST", "PUT", "DELETE", "OPTIONS"],
          "allow_headers": ["Content-Type", "Authorization"],
          "expose_headers": ["Content-Length"],
          "max_age": "3600"
        }
      },
      "endpoints": [
        {
          "endpoint": "/api/bff/health",
          "method": "GET",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/api/bff/health",
              "host": ["http://bff:8081"],
              "encoding": "json"
            }
          ]
        },
        {
          "endpoint": "/api/bff/users/login",
          "method": "POST",
          "output_encoding": "json",
          "backend": [
            {
              "url_pattern": "/api/bff/users/login",
              "host": ["http://bff:8081"],
              "encoding": "json",
              "method": "POST"
            }
          ]
        },
        {
          "endpoint": "/api/bff/users/{id}/username",
          "method": "PUT",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/users/{id}/username",
              "host": ["http://bff:8081"],
              "encoding": "json",
              "method": "PUT"
            }
          ]
        },
        {
          "endpoint": "/api/bff/users/{id}",
          "method": "GET",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/users/{id}",
              "host": ["http://bff:8081"],
              "encoding": "json"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory",
          "method": "GET",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory",
              "host": ["http://bff:8081"],
              "encoding": "json"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory/{id}",
          "method": "GET",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory/{id}",
              "host": ["http://bff:8081"],
              "encoding": "json"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory/stock-bajo",
          "method": "GET",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory/stock-bajo",
              "host": ["http://bff:8081"],
              "encoding": "json"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory",
          "method": "POST",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory",
              "host": ["http://bff:8081"],
              "encoding": "json",
              "method": "POST"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory/{id}/cantidad",
          "method": "PUT",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory/{id}/cantidad",
              "host": ["http://bff:8081"],
              "encoding": "json",
              "method": "PUT"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory/{id}/precio",
          "method": "PUT",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory/{id}/precio",
              "host": ["http://bff:8081"],
              "encoding": "json",
              "method": "PUT"
            }
          ]
        },
        {
          "endpoint": "/api/bff/inventory/{id}",
          "method": "DELETE",
          "output_encoding": "json",
          "input_headers": ["Authorization"],
          "backend": [
            {
              "url_pattern": "/api/bff/inventory/{id}",
              "host": ["http://bff:8081"],
              "encoding": "json",
              "method": "DELETE"
            }
          ]
        },
        {
          "endpoint": "/api/restock",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/{id}",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock/{id}",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/estado",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock/estado",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/resumen",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock/resumen",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/item/{id_item}",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock/item/{id_item}",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/bodega",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock/bodega",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/bodega/pendientes",
          "method": "GET",
          "backend": [
            {
              "url_pattern": "/api/restock/bodega/pendientes",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock",
          "method": "POST",
          "backend": [
            {
              "url_pattern": "/api/restock",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/{id}/estado",
          "method": "PUT",
          "backend": [
            {
              "url_pattern": "/api/restock/{id}/estado",
              "host": ["http://ms-restock:9093"]
            }
          ]
        },
        {
          "endpoint": "/api/restock/{id}",
          "method": "DELETE",
          "backend": [
            {
              "url_pattern": "/api/restock/{id}",
              "host": ["http://ms-restock:9093"]
            }
          ]
        }
      ]
    }