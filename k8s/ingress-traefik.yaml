apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krakend-ingress
  namespace: smartlogix
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/router.middlewares: "smartlogix-cors-middleware@kubernetescrd"
    # For HTTPS (uncomment when ready)
    # traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    # traefik.ingress.kubernetes.io/router.tls: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
  - host: smartlogix.local  # Change to your actual domain
    http:
      paths:
      # API Gateway routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: krakend
            port:
              number: 8080
      # Health checks
      - path: /__health
        pathType: Prefix
        backend:
          service:
            name: krakend
            port:
              number: 8080