apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartlogix-ingress
  namespace: smartlogix
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: smartlogix.local
      http:
        paths:
          # Frontend route - serve the React app
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # API routes - all /api/* go to krakend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: krakend
                port:
                  number: 8080
          # Health check for gateway
          - path: /__health
            pathType: Prefix
            backend:
              service:
                name: krakend
                port:
                  number: 8080