spring.application.name=bff
server.port=8081

# Microservice URLs
user-service.url=http://localhost:9090
inventory-service.url=${INVENTORY_SERVICE_URL:http://localhost:9091}
restock-service.url=${RESTOCK_SERVICE_URL:http://localhost:9093}
orders-service.url=${ORDERS_SERVICE_URL:http://localhost:9092}

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.show-actuator=false
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# Disable CORS for Spring Security
spring.security.cors.enabled=false

# ============================================
# SENTRY / GLITCHTIP CONFIGURATION
# ============================================
sentry.dsn=https://eb715c4fc99e4e0bb9661e8d658f676f@app.glitchtip.com/25295
sentry.environment=production
sentry.release=bff@1.0.0
sentry.traces-sample-rate=0.01
sentry.debug=true

sentry.enable-logs=true
sentry.logging.enabled=true
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=debug

sentry.tags.application=bff
sentry.tags.service=smartlogix-bff

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.smartlogix.bff=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springdoc=DEBUG
logging.level.io.sentry=DEBUG