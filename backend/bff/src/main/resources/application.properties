spring.application.name=bff
server.port=8081

# Microservice URLs
user-service.url=http://localhost:9090
inventory-service.url=http://localhost:9091
restock-service.url=${RESTOCK_SERVICE_URL:http://localhost:9093}
orders-service.url=${ORDERS_SERVICE_URL:http://localhost:9092}

# OpenAPI / Swagger Configuration - Support both paths
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.show-actuator=false

# Add this to ensure Swagger UI can find the docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# Logging
logging.level.com.smartlogix.bff=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springdoc=DEBUG
