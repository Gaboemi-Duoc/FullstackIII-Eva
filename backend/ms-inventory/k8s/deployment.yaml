apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
    spec:
      containers:
        - name: inventory-db
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: inventorydb
            - name: POSTGRES_USER
              value: inventory
            - name: POSTGRES_PASSWORD
              value: inventorypass123
          volumeMounts:
            - name: inventory-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: inventory-db-storage
          persistentVolumeClaim:
            claimName: inventory-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-inventory
  template:
    metadata:
      labels:
        app: ms-inventory
    spec:
      containers:
        - name: ms-inventory
          image: ms-inventory:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 9091
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://inventory-db:5432/inventorydb
            - name: SPRING_DATASOURCE_USERNAME
              value: inventory
            - name: SPRING_DATASOURCE_PASSWORD
              value: inventorypass123