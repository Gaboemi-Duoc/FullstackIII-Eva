apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-user
  namespace: smartlogix
  labels:
    app: ms-user
    service: backend
    component: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-user
  template:
    metadata:
      labels:
        app: ms-user
        service: backend
        component: user-service
    spec:
      containers:
      - name: ms-user
        image: ms-user:1.0
        imagePullPolicy: IfNotPresent
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://user-db:5432/userdb"
        - name: SPRING_DATASOURCE_USERNAME
          value: "user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "userpass123"
        - name: BREVO_API_KEY
          valueFrom:
            secretKeyRef:
              name: brevo-secrets
              key: api-key
              optional: true
        - name: BREVO_SENDER_EMAIL
          value: "noreply@smartlogix.com"
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        ports:
        - containerPort: 9090
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # Use a simpler health check if actuator isn't available
        livenessProbe:
          httpGet:
            path: /api/users/health  # Use a custom health endpoint instead
            port: 9090
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/users/health  # Use a custom health endpoint instead
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3