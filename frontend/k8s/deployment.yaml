apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: smartlogix
  labels:
    app: frontend
    service: frontend
    component: web-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        service: frontend
        component: web-ui
    spec:
      containers:
      - name: frontend
        image: frontend:1.0
        imagePullPolicy: IfNotPresent
        env:
        - name: BFF_URL
          value: "http://krakend:8080"
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10