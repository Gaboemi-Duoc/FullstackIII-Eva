apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: smartlogix
  labels:
    app: frontend
    service: frontend
    component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        service: frontend
        component: web-ui
    spec:
      containers:
      - name: frontend
        image: frontend:1.0
        imagePullPolicy: IfNotPresent
        env:
        # Use the Ingress URL for production
        - name: VITE_BFF_URL
          value: "http://smartlogix.local"  # Match your ingress host
        # Alternative: Use relative path if frontend and API are served from same domain
        # - name: VITE_BFF_URL
        #   value: ""
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10